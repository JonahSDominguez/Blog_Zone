<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Blog-Zone</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="moon-58-1024x1024.ico">
    </head>
    <body>
        <div class="banner">
            <h1>Blog-Zone</h1>
            <p>enter the blog-zone</p>
            <a href="about.html">ABOUT</a><br><br>
            <button class="new-post" onclick="location.href='new_post.html'">New blog post</button>
        </div>
        <!-- <div class="sidebar">
            <a href="#">home</a>
            <br>
            <a href="#">random</a>
            <br>
            <a href="#">search</a>
        </div> -->
        <div class="content" id="content">
        </div>
        <script type="module">
        (async () => {
            try{
                const response = await fetch('https://blogzone-production.up.railway.app/posts', { cache: 'no-store' });
                const posts = await response.json();

                const postsContainer = document.getElementById('content');

                posts.forEach(post => {
                    const div = document.createElement('div');
                    div.classList.add('post');
                    div.innerHTML = `
                        <br>
                        <h2>${post.title}</h2>
                        <p><strong>${post.author}</strong></p>
                        <p>${post.date}</p>
                        <p>${post.content}</p>
                        <br>
                    `;
                    postsContainer.appendChild(div);
                });
            }
            catch (error) {
                console.error('Error fetching posts:', error);
            }
        })();
        </script>
    </body>
</html>
